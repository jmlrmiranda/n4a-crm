<!DOCTYPE html>
<html lang="pt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>N4A CRM — Roadmap</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, 'Inter', sans-serif;
  background: #0f0f0f;
  color: #ffffff;
  font-size: 13px;
  line-height: 1.5;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}
:root {
  --mg: #e91e8c;
  --mg-dim: rgba(233,30,140,0.12);
  --mg-hover: #c4186f;
  --surface: #1a1a1a;
  --surface2: #141414;
  --border: #2a2a2a;
  --border2: #3a3a3a;
  --text: #ffffff;
  --muted: #888888;
  --hint: #444444;
  --success: #4caf50;
  --warning: #ff9800;
  --danger: #f44336;
  --purple: #7f77dd;
  --purple-dim: rgba(127,119,221,0.12);
  --amber: #ef9f27;
  --amber-dim: rgba(239,159,39,0.12);
  --teal: #1d9e75;
  --teal-dim: rgba(29,158,117,0.12);
  --gray-dim: rgba(255,255,255,0.06);
}
header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 14px 24px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
}
.logo { font-size: 18px; font-weight: 700; color: var(--mg); letter-spacing: -0.5px; }
.logo span { color: var(--muted); font-weight: 400; font-size: 13px; margin-left: 8px; }
.legend { display: flex; gap: 16px; align-items: center; }
.leg { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted); }
.dot { width: 8px; height: 8px; border-radius: 50%; }
.dot-done { background: var(--teal); }
.dot-wip { background: var(--purple); }
.dot-todo { background: var(--amber); }
.dot-future { background: var(--hint); }
.stats-bar {
  background: var(--surface2);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex;
  gap: 24px;
}
.stat { font-size: 12px; color: var(--muted); }
.stat strong { color: var(--text); font-weight: 500; margin-right: 4px; }
main { padding: 24px; max-width: 1100px; }
.area { margin-bottom: 32px; }
.area-header {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 12px;
  cursor: pointer;
  user-select: none;
}
.area-title { font-size: 14px; font-weight: 500; }
.area-count { font-size: 11px; color: var(--muted); background: var(--surface); border: 1px solid var(--border); border-radius: 10px; padding: 1px 8px; }
.chevron { color: var(--muted); font-size: 12px; transition: transform 0.2s; }
.area.collapsed .chevron { transform: rotate(-90deg); }
.area.collapsed .items { display: none; }
.items { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 8px; }
.item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: border-color 0.15s, background 0.15s;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.item:hover { border-color: var(--border2); background: #1e1e1e; }
.item.selected { border-color: var(--mg); }
.item-header { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
.item-name { font-size: 13px; font-weight: 500; }
.item-badge {
  font-size: 10px; font-weight: 500; text-transform: uppercase;
  letter-spacing: 0.04em; padding: 2px 7px; border-radius: 10px; white-space: nowrap;
}
.badge-done { background: var(--teal-dim); color: var(--teal); }
.badge-wip  { background: var(--purple-dim); color: var(--purple); }
.badge-todo { background: var(--amber-dim); color: var(--amber); }
.badge-future { background: var(--gray-dim); color: var(--muted); }
.item-desc { font-size: 11px; color: var(--muted); line-height: 1.4; }
.item-priority { font-size: 10px; color: var(--hint); margin-top: 2px; }
.item-priority.high { color: var(--danger); }
.item-priority.med { color: var(--warning); }
.detail-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; margin-bottom: 24px; overflow: hidden;
}
.detail-panel.hidden { display: none; }
.detail-header {
  padding: 16px 20px; border-bottom: 1px solid var(--border);
  display: flex; align-items: flex-start; justify-content: space-between; gap: 12px;
}
.detail-title { font-size: 15px; font-weight: 500; }
.detail-area { font-size: 11px; color: var(--muted); margin-top: 2px; }
.detail-close { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 0; line-height: 1; }
.detail-close:hover { color: var(--text); }
.detail-body { padding: 16px 20px; }
.detail-body p { color: var(--muted); font-size: 13px; line-height: 1.6; margin-bottom: 12px; }
.detail-meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--border); }
.meta-item { font-size: 11px; }
.meta-label { color: var(--hint); text-transform: uppercase; letter-spacing: 0.04em; margin-bottom: 2px; }
.meta-value { color: var(--text); font-weight: 500; }
.add-idea {
  background: none; border: 1px dashed var(--border2); border-radius: 8px;
  padding: 10px 14px; color: var(--muted); cursor: pointer; font-size: 12px;
  text-align: left; transition: border-color 0.15s, color 0.15s; width: 100%; margin-top: 8px;
}
.add-idea:hover { border-color: var(--mg); color: var(--mg); }
.idea-form { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px; display: none; margin-top: 8px; }
.idea-form.open { display: block; }
.idea-form input, .idea-form textarea, .idea-form select {
  width: 100%; background: #1a1a1a; border: 1px solid var(--border); border-radius: 6px;
  color: var(--text); font-size: 13px; padding: 8px 10px; margin-bottom: 8px; font-family: inherit; outline: none;
}
.idea-form input:focus, .idea-form textarea:focus, .idea-form select:focus { border-color: var(--mg); }
.idea-form textarea { resize: vertical; min-height: 60px; }
.idea-form-btns { display: flex; gap: 8px; }
.btn-save { background: var(--mg); color: #fff; border: none; border-radius: 6px; padding: 7px 14px; font-size: 12px; font-weight: 500; cursor: pointer; font-family: inherit; }
.btn-save:hover { background: var(--mg-hover); }
.btn-cancel { background: none; border: 1px solid var(--border); border-radius: 6px; padding: 7px 14px; font-size: 12px; color: var(--muted); cursor: pointer; font-family: inherit; }
.btn-cancel:hover { color: var(--text); }
</style>
</head>

<header>
  <div style="display:flex;align-items:center;gap:12px">
    <div class="logo">N4A <span>CRM Roadmap</span></div>
    <div style="font-size:11px;color:var(--hint)">actualizado 2026-06-23 — DEV FECHADO p/ testes: +título, histórico cliente, match propostas. Próximo: limpar DB + v1.0</div>
  </div>
  <div class="legend">

    <div class="leg"><div class="dot dot-wip"></div>em curso</div>
    <div class="leg"><div class="dot dot-todo"></div>a fazer</div>
    <div class="leg"><div class="dot dot-future"></div>futuro</div>
  </div>
</header>
<div class="stats-bar">

  <div class="stat"><strong id="s-future">0</strong>futuro</div>

<div id="detail-panel" class="detail-panel hidden">

    const doneCount = area.items.filter(i => i.status === "done").length;
    const total = area.items.length;
    div.innerHTML = `
      <div class="area-header" onclick="toggleArea('${area.id}')">
        <div class="area-title">${area.title}</div>
        <div class="area-count">${doneCount}/${total}</div>
        <div class="chevron">▾</div>
      </div>
      <div class="items" id="items-${area.id}"></div>
      <button class="add-idea" onclick="openIdeaForm('${area.id}')">+ nova ideia para ${area.title.toLowerCase()}</button>
      <div class="idea-form" id="form-${area.id}">
        <input type="text" placeholder="Nome da funcionalidade" id="fname-${area.id}">
        <textarea placeholder="Descrição e notas..." id="fdesc-${area.id}"></textarea>
        <select id="fstatus-${area.id}">
          <option value="todo">a fazer</option>
          <option value="future">futuro</option>
          <option value="wip">em curso</option>
        </select>
        <div class="idea-form-btns">
          <button class="btn-save" onclick="saveIdea('${area.id}')">Guardar ideia</button>
          <button class="btn-cancel" onclick="closeIdeaForm('${area.id}')">Cancelar</button>
        </div>
      </div>
    `;
    container.appendChild(div);
    const itemsDiv = div.querySelector(`#items-${area.id}`);
    area.items.forEach(item => {
      const el = document.createElement("div");
      el.className = "item" + (selectedItem === item.id ? " selected" : "");
      el.id = "item-" + item.id;
      el.onclick = () => showDetail(item, area.title);
      el.innerHTML = `
        <div class="item-header">
          <div class="item-name">${item.name}</div>
          <div class="item-badge badge-${item.status}">${statusLabel(item.status)}</div>
        </div>
        <div class="item-desc">${item.desc}</div>
        ${item.priority ? `<div class="item-priority ${item.priority}">${priorityLabel(item.priority)}</div>` : ""}
      `;
      itemsDiv.appendChild(el);
    });
  });

  document.getElementById("s-done").textContent = counts.done || 0;
  document.getElementById("s-wip").textContent = counts.wip || 0;
  document.getElementById("s-todo").textContent = counts.todo || 0;
  document.getElementById("s-future").textContent = counts.future || 0;
  document.getElementById("s-total").textContent = Object.values(counts).reduce((a,b)=>a+b,0);
}

function toggleArea(id) {
  document.getElementById("area-" + id).classList.toggle("collapsed");
}

function showDetail(item, areaTitle) {
  selectedItem = item.id;
  document.querySelectorAll(".item").forEach(el => el.classList.remove("selected"));
  const el = document.getElementById("item-" + item.id);
  if (el) el.classList.add("selected");
  document.getElementById("d-title").textContent = item.name;
  document.getElementById("d-area").textContent = areaTitle + " · " + statusLabel(item.status);
  let html = `<p>${item.desc}</p>`;
  if (item.notes) html += `<p>${item.notes}</p>`;
  html += `<div class="detail-meta">`;
  if (item.priority) html += `<div class="meta-item"><div class="meta-label">Prioridade</div><div class="meta-value" style="color:${item.priority==="high"?"var(--danger)":"var(--warning)"}">${priorityLabel(item.priority)}</div></div>`;
  if (item.api) html += `<div class="meta-item"><div class="meta-label">Endpoint API</div><div class="meta-value" style="font-family:monospace;font-size:12px">${item.api}</div></div>`;
  if (item.ui) html += `<div class="meta-item"><div class="meta-label">Componente UI</div><div class="meta-value" style="font-family:monospace;font-size:12px">${item.ui}</div></div>`;
  html += `</div>`;
  document.getElementById("d-body").innerHTML = html;
  document.getElementById("detail-panel").classList.remove("hidden");
  document.getElementById("detail-panel").scrollIntoView({ behavior: "smooth", block: "nearest" });
}

function closeDetail() {
  selectedItem = null;
  document.getElementById("detail-panel").classList.add("hidden");
  document.querySelectorAll(".item").forEach(el => el.classList.remove("selected"));
}

function openIdeaForm(areaId) {
  document.querySelectorAll(".idea-form").forEach(f => f.classList.remove("open"));
  document.getElementById("form-" + areaId).classList.add("open");
  document.getElementById("fname-" + areaId).focus();
}

function closeIdeaForm(areaId) {
  document.getElementById("form-" + areaId).classList.remove("open");
  document.getElementById("fname-" + areaId).value = "";
  document.getElementById("fdesc-" + areaId).value = "";
}

function saveIdea(areaId) {
  const name = document.getElementById("fname-" + areaId).value.trim();
  const desc = document.getElementById("fdesc-" + areaId).value.trim();
  const status = document.getElementById("fstatus-" + areaId).value;
  if (!name) return;
  const area = DATA.areas.find(a => a.id === areaId);
  const newId = areaId + "_" + Date.now();
  area.items.push({ id: newId, name, status, desc: desc || "Ideia nova — detalhar.", priority: "", notes: "Adicionado manualmente.", api: "", ui: "" });
  closeIdeaForm(areaId);
  renderAll();
  setTimeout(() => {
    const el = document.getElementById("item-" + newId);
    if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
  }, 100);
}

renderAll();
</script>
</body>
</html>
